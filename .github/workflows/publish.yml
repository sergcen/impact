name: Publish npm packages

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Verify tag and package versions
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          test "v${version}" = "$GITHUB_REF_NAME"
          node npm/verify-packages.cjs

  native:
    name: Build ${{ matrix.package }}
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            package: darwin-arm64
            source: monorepa
            destination: monorepa
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package: darwin-x64
            source: monorepa
            destination: monorepa
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu
            source: monorepa
            destination: monorepa
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            package: linux-x64-musl
            source: monorepa
            destination: monorepa
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu
            source: monorepa
            destination: monorepa
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            package: linux-arm64-musl
            source: monorepa
            destination: monorepa
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: win32-x64-msvc
            source: monorepa.exe
            destination: monorepa.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            package: win32-arm64-msvc
            source: monorepa.exe
            destination: monorepa.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install Rust target
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: 1.89.0
          target: ${{ matrix.target }}
      - name: Install musl linker
        if: endsWith(matrix.package, '-musl')
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Build native binary
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Smoke-test native binary
        shell: bash
        env:
          SOURCE: ${{ matrix.source }}
          TARGET: ${{ matrix.target }}
        run: |
          expected="monorepa $(node -p "require('./package.json').version")"
          actual=$("target/${TARGET}/release/${SOURCE}" --version)
          test "$actual" = "$expected"
      - name: Smoke-test install-time native entrypoint
        shell: bash
        env:
          SOURCE: ${{ matrix.source }}
          TARGET: ${{ matrix.target }}
        run: |
          export MONOREPA_IMPACT_BINARY="target/${TARGET}/release/${SOURCE}"
          node npm/install.cjs
          expected="monorepa $(node -p "require('./package.json').version")"
          actual=$("$PWD/npm/monorepa.exe" --version)
          test "$actual" = "$expected"
      - name: Assemble platform package
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
          SOURCE: ${{ matrix.source }}
          DESTINATION: ${{ matrix.destination }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p "npm/${PACKAGE}/bin" dist
          cp "target/${TARGET}/release/${SOURCE}" "npm/${PACKAGE}/bin/${DESTINATION}"
          node npm/prepare-package.cjs "npm/${PACKAGE}"
          npm pack "./npm/${PACKAGE}" --pack-destination dist
      - name: Upload package archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-${{ matrix.package }}
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 3

  root:
    name: Build @monorepa/impact
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Assemble root package
        run: |
          mkdir -p dist
          node npm/prepare-package.cjs .
          node npm/verify-packages.cjs
          npm pack . --pack-destination dist
      - name: Upload package archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-root
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish to npm
    needs:
      - native
      - root
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Install npm with trusted publishing support
        run: npm install --global npm@12.0.1
      - name: Download package archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Verify complete archive set
        run: node npm/verify-archives.cjs dist
      - name: Publish platform packages before root package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=${GITHUB_REF_NAME#v}
          for archive in dist/monorepa-impact-*-"${version}".tgz; do
            npm publish "$archive" --access public --provenance
          done
          npm publish "dist/monorepa-impact-${version}.tgz" --access public --provenance
